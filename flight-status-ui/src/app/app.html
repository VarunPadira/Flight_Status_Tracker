<div class="hero">
  <div class="hero-content">
    <div class="hero-icon">✈</div>
    <h1 class="hero-title">Flight Status Tracker</h1>
    <p class="hero-subtitle">Real-time flight information at your fingertips</p>
  </div>
</div>

<main class="main-content">
  <div class="search-section">
    <app-flight-search (search)="onSearch($event)" />
  </div>

  @if (loading()) {
    <div class="loading-container" aria-live="polite">
      <div class="loading-card">
        <div class="pulse-ring"></div>
        <span class="loading-text">Searching flights...</span>
      </div>
    </div>
  }

  @if (result() && !loading()) {
    <div class="result-section">
      <app-flight-status-card [flight]="result()!" />
    </div>
  }

  @if (error() && !loading()) {
    <div class="error-section">
      <app-error-display [message]="error()!" />
    </div>
  }
</main>
